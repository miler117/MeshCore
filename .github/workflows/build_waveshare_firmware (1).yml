name: Build Waveshare RP2040-LoRa-HF Repeater Firmware v5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MeshCore source v1.14.1
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: v1.14.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Show source structure
        run: |
          echo "=== Looking for powersaving in source ==="
          grep -rn "powersaving\|power_saving\|powerSaving" --include="*.cpp" --include="*.h" . | head -40

      - name: Patch 48MHz clock
        run: |
          sed -i '/board_build.filesystem_size/a\  board_build.f_cpu = 48000000L' \
            variants/waveshare_rp2040_lora/platformio.ini

      - name: Build
        run: pio run -e waveshare_rp2040_lora_repeater

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: wsrp2040lorahf-v1.14.1-48mhz-powersaving
          path: .pio/build/waveshare_rp2040_lora_repeater/firmware.uf2
          retention-days: 30
