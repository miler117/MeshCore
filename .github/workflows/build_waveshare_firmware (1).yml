name: Build Waveshare RP2040-LoRa-HF Repeater Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MeshCore source
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Patch pins + TCXO + 48MHz for RP2040-LoRa-HF (Kamami)
        run: |
          # Fix pins for Waveshare RP2040-LoRa-HF from Kamami
          # Official source has WRONG pins for this board variant
          # Correct: CS=3, BUSY=2, RESET=15, DIO1=20, ANT_SW=17, TCXO=1.8V
          sed -i \
            -e 's/-D P_LORA_NSS=13/-D P_LORA_NSS=3/' \
            -e 's/-D P_LORA_BUSY=18/-D P_LORA_BUSY=2/' \
            -e 's/-D P_LORA_RESET=23/-D P_LORA_RESET=15/' \
            -e 's/-D P_LORA_DIO_1=16/-D P_LORA_DIO_1=20/' \
            -e 's/-D SX126X_DIO3_TCXO_VOLTAGE=0/-D SX126X_DIO3_TCXO_VOLTAGE=1.8/' \
            variants/waveshare_rp2040_lora/platformio.ini

          # Set CPU clock to 48MHz
          sed -i '/board_build.filesystem_size/a\  board_build.f_cpu = 48000000L' \
            variants/waveshare_rp2040_lora/platformio.ini

          echo "=== Final platformio.ini ==="
          cat variants/waveshare_rp2040_lora/platformio.ini

      - name: Build
        run: pio run -e waveshare_rp2040_lora_repeater

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: wsrp2040lorahf-v1.14.1-HF-correct-pins
          path: .pio/build/waveshare_rp2040_lora_repeater/firmware.uf2
          retention-days: 30
