name: Build Waveshare RP2040-LoRa-HF Repeater Firmware v1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MeshCore source
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: main

      - name: Setup Build Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Patch 48MHz clock + fix LittleFS auto-format on first boot
        run: |
          sed -i '/board_build.filesystem_size/a\  board_build.f_cpu = 48000000L' \
            variants/waveshare_rp2040_lora/platformio.ini
          sed -i 's/LittleFS\.begin();/LittleFS.begin(true);/g' \
            examples/simple_repeater/main.cpp
          echo "=== LittleFS line in main.cpp ==="
          grep -n "LittleFS" examples/simple_repeater/main.cpp

      - name: Build firmware using official build script
        env:
          FIRMWARE_VERSION: v1.14.1
          DISABLE_DEBUG: 1
        run: |
          mkdir -p out
          bash build.sh build-firmware waveshare_rp2040_lora_repeater
          echo "=== Output files ==="
          ls -lh out/

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: wsrp2040lorahf-v1.14.1-48mhz-fix
          path: out/*.uf2
          retention-days: 30
