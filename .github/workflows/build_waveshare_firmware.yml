name: Build Waveshare RP2040-LoRa-HF Repeater Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MeshCore source
        uses: actions/checkout@v4
        with:
          repository: meshcore-dev/MeshCore
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Patch CPU voltage 0.90V + clock 48MHz
        run: |
          sed -i 's/#include "WaveshareBoard.h"/#include "WaveshareBoard.h"\n#include "hardware\/vreg.h"/' \
            variants/waveshare_rp2040_lora/WaveshareBoard.cpp
          sed -i 's/startup_reason = BD_STARTUP_NORMAL;/vreg_set_voltage(VREG_VOLTAGE_0_90);\n  set_sys_clock_khz(48000, true);\n  startup_reason = BD_STARTUP_NORMAL;/' \
            variants/waveshare_rp2040_lora/WaveshareBoard.cpp
          sed -i '/board_build.filesystem_size/a\  board_build.f_cpu = 48000000L' \
            variants/waveshare_rp2040_lora/platformio.ini

      - name: Build
        run: pio run -e waveshare_rp2040_lora_repeater

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: wsrp2040lorahf-v1.14.1-48mhz-0v90-repeater
          path: .pio/build/waveshare_rp2040_lora_repeater/firmware.uf2
          retention-days: 30
